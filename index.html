<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Trading Strategies Book</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-primary: #0d0f14;
    --bg-secondary: #13161e;
    --bg-tertiary: #1a1e2a;
    --bg-card: #1e2330;
    --accent: #6c63ff;
    --accent-glow: rgba(108, 99, 255, 0.3);
    --accent-2: #00d4aa;
    --accent-3: #ff6b6b;
    --text-primary: #e8eaf0;
    --text-secondary: #8892a4;
    --text-muted: #4a5568;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(108, 99, 255, 0.4);
    --sidebar-w: 300px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100vh;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(108,99,255,0.12) 0%, transparent 100%);
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.3px;
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  #search-box {
    margin: 12px;
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    width: calc(100% - 24px);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  #search-box::placeholder { color: var(--text-muted); }

  #nav-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    padding: 8px 8px 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }

  #nav-list li {
    margin: 3px 0;
  }

  #nav-list li button {
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.4;
  }

  #nav-list li button:hover {
    background: var(--bg-card);
    color: var(--text-primary);
    border-color: var(--border);
  }

  #nav-list li.active button {
    background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(0,212,170,0.1));
    color: #fff;
    border-color: var(--border-hover);
    box-shadow: 0 0 12px rgba(108,99,255,0.15);
  }

  .nav-icon { font-size: 16px; flex-shrink: 0; }

  .chapter-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px 14px 4px;
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #topbar {
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,15,20,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }

  #topbar .breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #topbar .breadcrumb span { color: var(--text-secondary); }

  #toggle-sidebar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    padding: 7px 12px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }
  #toggle-sidebar:hover { border-color: var(--accent); color: var(--accent); }

  .progress-bar {
    height: 2px;
    background: var(--border);
    flex: 1;
    max-width: 200px;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 99px;
    transition: width 0.3s;
  }

  #content-area {
    flex: 1;
    overflow-y: auto;
    padding: 48px 36px;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }

  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 20px;
    padding: 40px;
  }

  #welcome .big-icon { font-size: 72px; line-height: 1; }

  #welcome h2 {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #welcome p {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 400px;
    line-height: 1.6;
  }

  /* ── MARKDOWN STYLES ── */
  .md-body {
    max-width: 1060px;
    margin: 0 auto;
    line-height: 1.8;
    font-size: 16px;
    color: var(--text-primary);
  }

  .md-body h1 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, #a0aec0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid transparent;
    border-image: linear-gradient(90deg, var(--accent), var(--accent-2), transparent) 1;
    line-height: 1.3;
  }

  .md-body h2 {
    font-size: 1.45rem;
    font-weight: 700;
    color: #c3b9ff;
    margin: 36px 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .md-body h3 {
    font-size: 1.15rem;
    font-weight: 600;
    color: #90cdf4;
    margin: 28px 0 12px;
  }

  .md-body h4 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent-2);
    margin: 20px 0 10px;
  }

  .md-body p {
    margin: 12px 0;
    color: #d1d9e6;
  }

  .md-body strong { color: #fff; font-weight: 600; }
  .md-body em { color: #b794f4; font-style: italic; }

  .md-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-glow); }
  .md-body a:hover { border-color: var(--accent); }

  .md-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  .md-body code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--bg-card);
    color: #a8ff78;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }

  .md-body pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    overflow-x: auto;
    margin: 16px 0;
    position: relative;
  }

  .md-body pre code {
    background: none;
    border: none;
    padding: 0;
    color: #a8ff78;
    font-size: 13px;
    line-height: 1.7;
  }

  .md-body blockquote {
    border-left: 3px solid var(--accent);
    background: rgba(108,99,255,0.08);
    padding: 14px 20px;
    margin: 16px 0;
    border-radius: 0 10px 10px 0;
    color: #b794f4;
    font-style: italic;
  }

  /* GitHub-style alerts */
  .md-body blockquote:has(p strong) { }

  .alert-note {
    border-left: 3px solid #63b3ed;
    background: rgba(99,179,237,0.08);
    border-radius: 0 10px 10px 0;
    padding: 14px 20px;
    margin: 16px 0;
    color: #bee3f8;
  }
  .alert-tip {
    border-left: 3px solid var(--accent-2);
    background: rgba(0,212,170,0.08);
    border-radius: 0 10px 10px 0;
    padding: 14px 20px;
    margin: 16px 0;
    color: #b2f5ea;
  }
  .alert-important {
    border-left: 3px solid #b794f4;
    background: rgba(183,148,244,0.08);
    border-radius: 0 10px 10px 0;
    padding: 14px 20px;
    margin: 16px 0;
    color: #e9d8fd;
  }
  .alert-warning {
    border-left: 3px solid #f6ad55;
    background: rgba(246,173,85,0.08);
    border-radius: 0 10px 10px 0;
    padding: 14px 20px;
    margin: 16px 0;
    color: #feebc8;
  }
  .alert-caution {
    border-left: 3px solid var(--accent-3);
    background: rgba(255,107,107,0.08);
    border-radius: 0 10px 10px 0;
    padding: 14px 20px;
    margin: 16px 0;
    color: #fed7d7;
  }

  .md-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14px;
  }

  .md-body th {
    background: var(--bg-card);
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--accent);
    border-bottom: 2px solid var(--accent-glow);
    font-size: 13px;
  }

  .md-body td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: top;
  }

  .md-body tr:hover td { background: rgba(255,255,255,0.02); }

  .md-body ul, .md-body ol {
    padding-left: 24px;
    margin: 12px 0;
  }

  .md-body li {
    margin: 6px 0;
    color: #d1d9e6;
  }

  .md-body li::marker { color: var(--accent); }

  /* ── NAV BUTTONS ── */
  .page-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 860px;
    margin: 48px auto 0;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    gap: 16px;
  }

  .page-nav button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-secondary);
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .page-nav button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,99,255,0.1);
    transform: translateY(-1px);
  }

  .page-nav button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .page-counter {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    #sidebar {
      position: fixed;
      left: 0; top: 0;
      transform: translateX(-100%);
    }
    #sidebar.open { transform: translateX(0); }
    #content-area { padding: 24px 20px; }
  }

  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── VISUALIZATIONS ── */
  .viz-container {
    margin: 28px 0;
    background: #13161e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px;
    overflow-x: auto;
    max-width: 100%;
  }
  .viz-title {
    font-size: 13px; font-weight: 700; color: #7c6fff;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .viz-profiles { display: flex; gap: 12px; align-items: flex-start; flex-wrap: nowrap; }
  .viz-profile { display: flex; flex-direction: column; gap: 6px; }
  .viz-profile-label {
    font-size: 11px; font-weight: 700; text-align: center;
    padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: .5px;
  }
  .viz-charts { display: flex; gap: 0; align-items: stretch; }
  .viz-price-axis {
    display: flex; flex-direction: column-reverse;
    padding-right: 5px; font-family: 'JetBrains Mono',monospace;
    font-size: 9px; color: #2d3748; min-width: 48px; text-align: right;
  }
  .viz-price-lbl { display: flex; align-items: center; justify-content: flex-end; }
  .viz-price-lbl.poc  { color: #ffd700; font-weight: 700; }
  .viz-price-lbl.vah  { color: #7c6fff; }
  .viz-price-lbl.val  { color: #7c6fff; }
  .viz-price-lbl.ibh  { color: #48bb78; }
  .viz-price-lbl.ibl  { color: #48bb78; }
  .viz-col-hdr {
    font-size: 9px; font-weight: 700; color: #4a5568;
    text-align: center; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: .6px;
  }
  .viz-divider { width: 1px; background: rgba(255,255,255,0.06); margin: 0 5px; }
  .viz-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .viz-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #718096; }
  .viz-legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .viz-note {
    background: rgba(72,187,120,0.08); border: 1px solid rgba(72,187,120,0.25);
    border-radius: 8px; padding: 10px 14px; font-size: 12px;
    color: #68d391; margin-top: 12px; line-height: 1.6;
  }
  .viz-connector {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 0 8px; gap: 6px;
  }
  .viz-connector-arrow { font-size: 22px; color: #48bb78; }
  .viz-connector-label {
    font-size: 9px; font-weight: 700; color: #48bb78;
    text-transform: uppercase; letter-spacing: .5px; writing-mode: vertical-rl;
    text-orientation: mixed; transform: rotate(180deg);
  }
  .viz-bracket {
    position: absolute; right: -14px;
    border-right: 2px solid #48bb78;
    border-top: 2px solid #48bb78;
    border-bottom: 2px solid #48bb78;
    border-radius: 0 4px 4px 0;
    width: 10px;
  }
  .viz-bracket-label {
    position: absolute; right: -52px;
    font-size: 9px; font-weight: 700; color: #48bb78;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">
    <h1>📚 Trading Book</h1>
    <p>Market Profile Strategies</p>
  </div>
  <input type="text" id="search-box" placeholder="🔍  Search chapters..." oninput="filterNav(this.value)">
  <ul id="nav-list"></ul>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="topbar">
    <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <div class="breadcrumb">
      <span>📖</span>
      <span id="breadcrumb-text">Select a chapter</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span class="page-counter" id="page-counter"></span>
  </div>

  <div id="content-area">
    <div id="welcome">
      <div class="big-icon">📚</div>
      <h2>Trading Strategies Book</h2>
      <p>Select a chapter from the sidebar to start reading. All Market Profile strategies are ready.</p>
    </div>
  </div>
</main>

<script>
const files = [
  { name: "Part 1 — Fundamental Concepts", file: "Part 1.md", icon: "📖" },
  { name: "Part 2", file: "Part 2.md", icon: "📖" },
  { name: "Part 3", file: "Part 3.md", icon: "📖" },
  { name: "Strategy 1 — LVA", file: "strategy_1_lva_lesson.md", icon: "📊" },
  { name: "Strategy 2 — LVA Fill", file: "strategy_2_lva_fill_lesson.md", icon: "📊" },
  { name: "Strategy 3 — Open Drive", file: "strategy_3_open_drive_lesson.md", icon: "📊" },
  { name: "Strategy 4 — Confluence IB", file: "strategy_4_confluence_ib_lesson.md", icon: "📊" },
  { name: "Strategy 5 — Consolidation", file: "strategy_5_consolidation_lesson.md", icon: "📊" },
  { name: "Strategy 6 — Wide IB", file: "strategy_6_wide_ib_lesson.md", icon: "📊" },
  { name: "Strategy 7 — Trend Day", file: "strategy_7_trend_day_lesson.md", icon: "📊" },
  { name: "Strategy 8 — Day Two Trend", file: "strategy_8_day_two_trend_lesson.md", icon: "📊" },
  { name: "Strategy 9 — Engulfing", file: "strategy_9_engulfing_lesson.md", icon: "📊" },
  { name: "Strategy 10 — Gap Day", file: "strategy_10_gap_day_lesson.md", icon: "📊" },
  { name: "Strategy 11 — Tail Reversal", file: "strategy_11_tail_reversal_lesson.md", icon: "📊" },
];

let currentIndex = -1;
let allItems = [];

function buildNav() {
  const ul = document.getElementById('nav-list');

  // Parts group
  const partsLabel = document.createElement('li');
  partsLabel.className = 'chapter-label';
  partsLabel.textContent = 'Notes & Parts';
  ul.appendChild(partsLabel);

  files.forEach((f, i) => {
    const li = document.createElement('li');
    li.dataset.idx = i;
    li.dataset.name = f.name.toLowerCase();
    const btn = document.createElement('button');
    btn.id = `nav-btn-${i}`;
    btn.innerHTML = `<span class="nav-icon">${f.icon}</span>${f.name}`;
    btn.onclick = () => loadChapter(i);

    if (i === 3) {
      const stratLabel = document.createElement('li');
      stratLabel.className = 'chapter-label';
      stratLabel.textContent = 'Strategies';
      ul.appendChild(stratLabel);
    }

    li.appendChild(btn);
    ul.appendChild(li);
    allItems.push(li);
  });
}

function filterNav(query) {
  const q = query.toLowerCase();
  allItems.forEach(li => {
    const name = li.dataset.name || '';
    li.style.display = name.includes(q) ? '' : 'none';
  });
}

async function loadChapter(idx) {
  currentIndex = idx;

  // Update nav active state
  allItems.forEach(li => li.classList.remove('active'));
  if (allItems[idx]) allItems[idx].classList.add('active');

  // Update topbar
  document.getElementById('breadcrumb-text').textContent = files[idx].name;
  const pct = ((idx + 1) / files.length * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('page-counter').textContent = `${idx + 1} / ${files.length}`;

  // Show loader
  const area = document.getElementById('content-area');
  area.innerHTML = `<div id="loading"><div class="spinner"></div><p>Loading chapter…</p></div>`;

  try {
    const resp = await fetch(files[idx].file);
    if (!resp.ok) throw new Error('File not found: ' + files[idx].file);
    const text = await resp.text();
    renderMD(text, idx);
  } catch (e) {
    area.innerHTML = `<div style="padding:40px;color:#ff6b6b;">⚠️ Error: ${e.message}</div>`;
  }
}

function renderMD(text, idx) {
  // Pre-process GitHub alerts
  text = text.replace(/^> \[!NOTE\]\s*\n((?:> .*\n?)*)/gm, (_, body) => {
    const content = body.replace(/^> ?/gm, '').trim();
    return `<div class="alert-note">📘 <strong>Note</strong><br>${marked.parse(content)}</div>\n\n`;
  });
  text = text.replace(/^> \[!TIP\]\s*\n((?:> .*\n?)*)/gm, (_, body) => {
    const content = body.replace(/^> ?/gm, '').trim();
    return `<div class="alert-tip">💡 <strong>Tip</strong><br>${marked.parse(content)}</div>\n\n`;
  });
  text = text.replace(/^> \[!IMPORTANT\]\s*\n((?:> .*\n?)*)/gm, (_, body) => {
    const content = body.replace(/^> ?/gm, '').trim();
    return `<div class="alert-important">⚠️ <strong>Important</strong><br>${marked.parse(content)}</div>\n\n`;
  });
  text = text.replace(/^> \[!WARNING\]\s*\n((?:> .*\n?)*)/gm, (_, body) => {
    const content = body.replace(/^> ?/gm, '').trim();
    return `<div class="alert-warning">🔶 <strong>Warning</strong><br>${marked.parse(content)}</div>\n\n`;
  });
  text = text.replace(/^> \[!CAUTION\]\s*\n((?:> .*\n?)*)/gm, (_, body) => {
    const content = body.replace(/^> ?/gm, '').trim();
    return `<div class="alert-caution">🚨 <strong>Caution</strong><br>${marked.parse(content)}</div>\n\n`;
  });

  const html = marked.parse(text);

  const area = document.getElementById('content-area');
  area.innerHTML = `
    <div class="md-body fade-in">
      ${html}
      <div class="page-nav">
        <button onclick="loadChapter(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
        <span class="page-counter">${idx + 1} of ${files.length}</span>
        <button onclick="loadChapter(${idx + 1})" ${idx === files.length - 1 ? 'disabled' : ''}>Next →</button>
      </div>
    </div>`;
  area.scrollTop = 0;
  // Inject visualizations for this file
  setTimeout(() => injectVisualizations(files[idx].file), 50);
}

//   VISUALIZATION ENGINE
// ═══════════════════════════════════════════
const VIZ_PERIODS = 'ABCDEFGHIJKLMN';
const VIZ_CELL = 12;
const VIZ_LETTER = 9;
const VIZ_COLORS = {
  va:'rgba(108,99,255,0.18)', vaBorder:'rgba(108,99,255,0.55)',
  poc:'#ffd700', ib:'rgba(72,187,120,0.13)', ibBorder:'rgba(72,187,120,0.55)',
  tail:'rgba(245,101,101,0.18)',
  letters:['#7c6fff','#5eead4','#fbbf24','#f87171','#a78bfa','#34d399',
            '#60a5fa','#f472b6','#fb923c','#a3e635','#38bdf8','#e879f9','#facc15','#4ade80'],
};

// ── REALISTIC TICK SIMULATOR ─────────────────
function generateSimulatedProfile(type, startPrice) {
  let currentPrice = startPrice;
  const data = [];
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let i=0; i<13; i++) {
    const period = alphabet[i];
    let pMin = currentPrice; let pMax = currentPrice; let pOpen = currentPrice;
    for (let m=0; m<30; m++) {
      let drift = 0; let vol = 2.5;
      switch(type) {
        case 'open_drive':
          drift = 1.8; vol = 2; break; // relentless up
        case 'open_test_drive':
          if (i === 0 && m < 15) { drift = -2.5; vol = 3; } // test down
          else { drift = 1.5; vol = 2; } // drive up
          break;
        case 'open_rejection':
          if (i === 0) { drift = 1.5; vol = 4; } // fake up
          else { drift = -2.0; vol = 3.5; } // hard reverse down
          break;
        case 'open_auction':
          drift = Math.sin((i*30+m)/15) * 1.5; // swing
          drift += (startPrice - currentPrice) * 0.05; // pull back
          vol = 3.5; break;
      }
      currentPrice += drift + (Math.random() - 0.5) * vol * 2;
      if (currentPrice < pMin) pMin = currentPrice;
      if (currentPrice > pMax) pMax = currentPrice;
    }
    data.push({ period, lo: Math.round(pMin), hi: Math.round(pMax), open: Math.round(pOpen), close: Math.round(currentPrice) });
  }
  return data;
}

function vizBuildProfile(data, forcedMin, forcedMax) {
  const allP = data.flatMap(d=>{const a=[];for(let v=d.lo;v<=d.hi;v++)a.push(v);return a;});
  const pMin = forcedMin!==undefined ? forcedMin : Math.min(...allP);
  const pMax = forcedMax!==undefined ? forcedMax : Math.max(...allP);
  const rows = {};
  for(let p=pMin;p<=pMax;p++) rows[p]=[];
  data.forEach(d=>{ 
    for(let p=d.lo;p<=d.hi;p++) {
      if(!rows[p]) continue;
      // ORGANIC JITTER: randomly skip edge TPOs for a realistic jagged look
      if ((p === d.lo || p === d.hi) && Math.random() < 0.35) continue;
      if ((p === d.lo+1 || p === d.hi-1) && Math.random() < 0.15) continue;
      rows[p].push(d.period); 
    }
  });
  let poc=pMin, maxC=0;
  for(let p=pMin;p<=pMax;p++) if(rows[p].length>maxC){maxC=rows[p].length;poc=p;}
  const total=Object.values(rows).reduce((s,v)=>s+v.length,0);
  const target=Math.floor(total*0.7);
  let vaC=rows[poc].length,vah=poc,val=poc;
  while(vaC<target){
    const up=vah<pMax?rows[vah+1].length:0, dn=val>pMin?rows[val-1].length:0;
    if(up>=dn&&vah<pMax){vah++;vaC+=rows[vah].length;}else if(val>pMin){val--;vaC+=rows[val].length;}else break;
  }
  const ibP=data.filter(d=>d.period==='A'||d.period==='B');
  const ibH=ibP.length?Math.max(...ibP.map(d=>d.hi)):pMax;
  const ibL=ibP.length?Math.min(...ibP.map(d=>d.lo)):pMin;
  let stLo=pMax; for(let p=pMax;p>=pMin;p--){if(rows[p].length===1)stLo=p;else break;}
  let btHi=pMin; for(let p=pMin;p<=pMax;p++){if(rows[p].length===1)btHi=p;else break;}
  const volume={};
  for(let p=pMin;p<=pMax;p++){
    const t=rows[p].length;
    if(t===0){volume[p]=Math.round(15+Math.random()*55);continue;} // forced range = tiny but visible
    if(t===1){volume[p]=Math.round(90+Math.random()*160);continue;} // single print = very thin
    if(t<=2){volume[p]=Math.round(320+Math.random()*480);continue;} // low TPO = thin
    const base=t*1600;
    volume[p]=Math.max(400,Math.round(base+(Math.random()-.5)*base*0.55));
  }
  // Boost POC, add organic spikes
  volume[poc]=Math.round((volume[poc]||1000)*1.7);
  for(let p=pMin;p<=pMax;p++){
    if(volume[p]>50&&Math.random()<0.2) volume[p]=Math.round(volume[p]*(0.45+Math.random()*0.7));
  }
  let vpPoc=pMin,maxV=0;
  for(let p=pMin;p<=pMax;p++) if(volume[p]>maxV){maxV=volume[p];vpPoc=p;}
  let vcnt=volume[vpPoc],vpVah=vpPoc,vpVal=vpPoc;
  const vtotal=Object.values(volume).reduce((s,v)=>s+v,0);
  const vtgt=Math.floor(vtotal*0.7);
  while(vcnt<vtgt){
    const up=vpVah<pMax?volume[vpVah+1]:0, dn=vpVal>pMin?volume[vpVal-1]:0;
    if(up>=dn&&vpVah<pMax){vpVah++;vcnt+=volume[vpVah];}else if(vpVal>pMin){vpVal--;vcnt+=volume[vpVal];}else break;
  }
  return {rows,volume,pMin,pMax,poc,vah,val,ibH,ibL,stLo,btHi,vpPoc,vpVah,vpVal,data};
}

function vizDrawTPO(canvas, prof) {
  const ctx=canvas.getContext('2d');
  const {rows,pMin,pMax,poc,vah,val,ibH,ibL,stLo,btHi,data}=prof;
  const count=pMax-pMin+1, W=canvas.width, H=canvas.height;
  const rH=Math.max(1, Math.floor(H/count)); // ensure minimum height
  function py(p){return H-(p-pMin)*rH-rH/2;}
  ctx.fillStyle='#0a0c12'; ctx.fillRect(0,0,W,H);
  
  // Row height
  const letterSz=Math.max(5,Math.min(VIZ_LETTER,rH-1));
  const cellW=Math.max(7,letterSz+3);
  
  // VA Background
  const vaTop=py(vah)-rH/2, vaBot=py(val)+rH/2;
  ctx.fillStyle=VIZ_COLORS.va; ctx.fillRect(0,vaTop,W,vaBot-vaTop);
  ctx.strokeStyle=VIZ_COLORS.vaBorder; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.strokeRect(0,vaTop,W,vaBot-vaTop); ctx.setLineDash([]);
  
  // BACKGROUND CANDLESTICKS
  if (data && data.length > 0 && data[0].open !== undefined) {
    const cW = Math.min((W - 50) / data.length * 0.5, 6);
    data.forEach((d, i) => {
      const cX = 35 + i * ((W - 50) / Math.max(1, data.length - 1));
      const yO = py(d.open); const yC = py(d.close);
      const yH = py(d.hi); const yL = py(d.lo);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cX, yH); ctx.lineTo(cX, yL); ctx.stroke();
      ctx.fillStyle = d.close >= d.open ? 'rgba(72,187,120,0.1)' : 'rgba(245,101,101,0.1)';
      ctx.fillRect(cX - cW/2, Math.min(yO, yC), cW, Math.max(Math.abs(yO-yC), 1));
    });
  }
  // IB
  ctx.fillStyle=VIZ_COLORS.ib;
  ctx.fillRect(0,py(ibH)-rH/2,W,(py(ibL)+rH/2)-(py(ibH)-rH/2));
  // Tails
  if(stLo<pMax){ctx.fillStyle=VIZ_COLORS.tail;ctx.fillRect(0,py(pMax)-rH/2,W,(py(stLo)+rH/2)-(py(pMax)-rH/2));}
  if(btHi>pMin){ctx.fillStyle=VIZ_COLORS.tail;ctx.fillRect(0,py(btHi)-rH/2,W,(py(pMin)+rH/2)-(py(btHi)-rH/2));}
  // POC line
  ctx.strokeStyle=VIZ_COLORS.poc; ctx.lineWidth=1.5; ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.moveTo(0,py(poc)); ctx.lineTo(W,py(poc)); ctx.stroke(); ctx.setLineDash([]);
  // IB borders
  ctx.strokeStyle=VIZ_COLORS.ibBorder; ctx.lineWidth=1;
  [[ibH,-1],[ibL,1]].forEach(([p,d])=>{const y=py(p)+d*rH/2;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
  // Labels
  ctx.font='bold 7px JetBrains Mono,monospace';
  ctx.fillStyle='#7c6fff'; ctx.fillText('VAH',W-22,py(vah)-rH/2+7); ctx.fillText('VAL',W-22,py(val)+rH/2-1);
  ctx.fillStyle='#48bb78'; ctx.fillText('IBH',W-42,py(ibH)-rH/2+7); ctx.fillText('IBL',W-42,py(ibL)+rH/2-1);
  ctx.fillStyle=VIZ_COLORS.poc; ctx.fillText('POC',W-62,py(poc)+3);
  // Letters — scaled to row height
  ctx.font=`bold ${letterSz}px JetBrains Mono,monospace`;
  for(let price=pMin;price<=pMax;price++){
    rows[price].forEach((ltr,i)=>{
      const pi=VIZ_PERIODS.indexOf(ltr);
      ctx.fillStyle=price===poc?VIZ_COLORS.poc:VIZ_COLORS.letters[pi%VIZ_COLORS.letters.length];
      ctx.shadowColor=price===poc?'#ffd70060':'transparent'; ctx.shadowBlur=price===poc?3:0;
      ctx.fillText(ltr, i*(cellW+1), py(price)+letterSz/2);
    });
  }
  ctx.shadowBlur=0;
}

function vizDrawVP(canvas, prof) {
  const ctx=canvas.getContext('2d');
  const {volume,pMin,pMax,vpPoc,vpVah,vpVal}=prof;
  const count=pMax-pMin+1, W=canvas.width, H=canvas.height;
  const rH=Math.floor(H/count);
  const maxV=Math.max(...Object.values(volume));
  function py(p){return H-(p-pMin)*rH;}
  ctx.fillStyle='#0a0c12'; ctx.fillRect(0,0,W,H);
  // VA bg
  ctx.fillStyle='rgba(108,99,255,0.1)';
  ctx.fillRect(0,py(vpVah),W,py(vpVal)+rH-py(vpVah));
  ctx.strokeStyle='rgba(108,99,255,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.strokeRect(0,py(vpVah),W,py(vpVal)+rH-py(vpVah)); ctx.setLineDash([]);
  // Bars
  for(let price=pMin;price<=pMax;price++){
    const vol=volume[price]||0;
    if(vol===0){continue;}
    const barW=Math.max(1,Math.round((vol/maxV)*(W-4)));
    const y=py(price), isLVN=barW<(W-4)*0.18;
    let g;
    if(price===vpPoc){g=ctx.createLinearGradient(0,0,barW,0);g.addColorStop(0,'rgba(255,215,0,0.9)');g.addColorStop(1,'rgba(255,215,0,0.2)');}
    else if(price>=vpVal&&price<=vpVah){g=ctx.createLinearGradient(0,0,barW,0);g.addColorStop(0,'rgba(108,99,255,0.85)');g.addColorStop(1,'rgba(108,99,255,0.2)');}
    else if(isLVN){g=ctx.createLinearGradient(0,0,barW,0);g.addColorStop(0,'rgba(108,99,255,0.22)');g.addColorStop(1,'rgba(108,99,255,0.05)');}
    else{g=ctx.createLinearGradient(0,0,barW,0);g.addColorStop(0,'rgba(108,99,255,0.55)');g.addColorStop(1,'rgba(108,99,255,0.12)');}
    ctx.fillStyle=g; ctx.fillRect(0,y,barW,Math.max(1,rH-1));
    if(price===vpPoc){ctx.shadowColor='rgba(255,215,0,0.4)';ctx.shadowBlur=6;ctx.fillStyle='rgba(255,215,0,0.9)';ctx.fillRect(0,y,barW,Math.max(1,rH-1));ctx.shadowBlur=0;}
  }
  // VPOC line
  const pY=py(vpPoc)+rH/2;
  ctx.strokeStyle=VIZ_COLORS.poc; ctx.lineWidth=1.5; ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.moveTo(0,pY); ctx.lineTo(W,pY); ctx.stroke(); ctx.setLineDash([]);
  // Labels
  ctx.font='bold 7px JetBrains Mono,monospace';
  ctx.fillStyle='#7c6fff'; ctx.fillText('VAH',2,py(vpVah)+7); ctx.fillText('VAL',2,py(vpVal)+rH-1);
  ctx.fillStyle=VIZ_COLORS.poc; ctx.fillText('VPOC',2,pY-2);
}

function vizBuildAxis(el, prof, rH) {
  const {pMin,pMax,poc,vah,val,ibH,ibL}=prof;
  el.innerHTML=''; el.style.height='auto';
  const every=pMax>1000?10:5;
  for(let p=pMax;p>=pMin;p--){
    const d=document.createElement('div');
    d.className='viz-price-lbl'; d.style.height=rH+'px'; d.style.minHeight=rH+'px';
    const isKey=p===poc||p===vah||p===val||p===ibH||p===ibL;
    if(isKey||p%every===0) d.textContent=p;
    if(p===poc)d.classList.add('poc'); else if(p===vah)d.classList.add('vah');
    else if(p===val)d.classList.add('val'); else if(p===ibH)d.classList.add('ibh');
    else if(p===ibL)d.classList.add('ibl');
    el.appendChild(d);
  }
}

function vizCreateProfileBlock(data, forcedMin, forcedMax, canvasH, tpoW, vpW) {
  const prof=vizBuildProfile(data, forcedMin, forcedMax);
  const count=prof.pMax-prof.pMin+1;
  const rH=Math.floor(canvasH/count);
  const wrap=document.createElement('div');
  wrap.className='viz-profile';
  // charts row
  const chartsRow=document.createElement('div');
  chartsRow.className='viz-charts';
  // axis
  const axisEl=document.createElement('div');
  axisEl.className='viz-price-axis';
  // tpo col
  const tpoCol=document.createElement('div'); tpoCol.style.display='flex'; tpoCol.style.flexDirection='column';
  const tpoHdr=document.createElement('div'); tpoHdr.className='viz-col-hdr'; tpoHdr.textContent='TPO';
  const tpoCanvas=document.createElement('canvas'); tpoCanvas.width=tpoW; tpoCanvas.height=canvasH;
  tpoCol.appendChild(tpoHdr); tpoCol.appendChild(tpoCanvas);
  // divider
  const div=document.createElement('div'); div.className='viz-divider';
  // vp col
  const vpCol=document.createElement('div'); vpCol.style.display='flex'; vpCol.style.flexDirection='column';
  const vpHdr=document.createElement('div'); vpHdr.className='viz-col-hdr'; vpHdr.textContent='VP';
  const vpCanvas=document.createElement('canvas'); vpCanvas.width=vpW; vpCanvas.height=canvasH;
  vpCol.appendChild(vpHdr); vpCol.appendChild(vpCanvas);
  chartsRow.appendChild(axisEl); chartsRow.appendChild(tpoCol); chartsRow.appendChild(div); chartsRow.appendChild(vpCol);
  wrap.appendChild(chartsRow);
  // Draw
  setTimeout(()=>{
    vizDrawTPO(tpoCanvas, prof);
    vizDrawVP(vpCanvas, prof);

  }, 0);
  return {el:wrap, prof};
}

function injectVisualizations(filename) {
  const map = VIZ_MAP[filename];
  if (!map) return;
  const body = document.querySelector('.md-body');
  if (!body) return;
  const headings = body.querySelectorAll('h1, h2, h3');
  headings.forEach(h => {
    const txt = h.textContent || '';
    map.forEach(entry => {
      if (!txt.includes(entry.match)) return;
      // Find the next <hr> or next heading sibling to insert before
      let el = h;
      let insertBefore = null;
      while (el.nextElementSibling) {
        el = el.nextElementSibling;
        // Stop at next heading or horizontal rule
        if (/^H[1-6]$/.test(el.tagName) || el.tagName === 'HR') { 
          insertBefore = el; 
          break; 
        }
      }
      const vizEl = entry.renderer();
      if (insertBefore) body.insertBefore(vizEl, insertBefore);
      else body.appendChild(vizEl);
    });
  });
}
